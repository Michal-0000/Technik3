<div class="container mt-5">
    <h1 class="mb-4">Czytnik plików tekstowych</h1>

    <div class="mb-4">
        <label for="textFile" class="form-label">Wczytaj pliki .txt</label>
        <input type="file" multiple id="textFile" accept=".txt" 
               class="form-control" (change)="onFileSelected($event)">
    </div>

    <div class="row">
        <div *ngFor="let file of textFiles(); let i = index;" class="col-12 mb-4">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <strong>{{ file.name }}</strong>
                    <span class="badge bg-secondary">{{ file.size / 1024 | number:'1.1-1' }} KB</span>
                </div>
                <div class="card-body">
                    <pre class="card-text" style="white-space: pre-wrap; background: #f8f9fa; padding: 15px;">{{ file.content }}</pre>
                    <div class="text-end mt-2">
                        <button class="btn btn-danger btn-sm" (click)="remove(i)">Usuń dokument</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
