<div class="container mt-5">

    <h1 class="mb-4">Fotogaleria</h1>

    <div class="mb-4">
        <label for ="fileInput" class="form-control">Wybierz plik</label>
        <input type="file" multiple id="fileInput" class="form-control" (change)="onFileSelected($event)">
    </div>

    <div class="row">
        <div *ngFor="let image of images(); let i = index;" class="col-md-4 mb-4">
            <div class="card">
                <img [src]="image" class="card-img-top">
                <div class="card-body text-center">
                   <!-- <h5 class="card-title"> </h5>-->
                    <p class="card-text">{{ getName(files()[i]?.name || '') }} </p>
                    <p class="card-text">Rozmiar: {{ (files()[i]?.size || 0) / 1048576 | number:'1.2-2' }} MB</p>
                    <button class="btn btn-danger" (click)="remove(i)">Usuń</button>
                </div>                
            </div>
        </div>
    </div>

</div>
